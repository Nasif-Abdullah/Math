<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "My Math Notes" }}</title>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            line-height: 1.6; 
            margin: 0; 
            padding: 0; 
            color: #333; 
            display: flex;
        }
        h1, h2, h3 { color: #111; }
        code { background: #f4f4f4; padding: 2px 5px; border-radius: 3px; }

        /* Sidebar Styling */
        .sidebar {
            width: 250px;
            height: 100vh;
            background: #f8f9fa;
            border-right: 1px solid #e5e5e5;
            position: fixed;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }
        .sidebar h2 { font-size: 1.2rem; margin-top: 0; color: #555; }
        .sidebar ul { list-style: none; padding: 0; margin: 0; }
        .sidebar li { margin-bottom: 10px; }
        .sidebar a { color: #0066cc; text-decoration: none; }
        .sidebar a:hover { text-decoration: underline; }
        .sidebar a.active { font-weight: bold; color: #111; }

        /* Main Content Styling */
        .main-content {
            margin-left: 250px; /* Matches sidebar width */
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Responsive design for smaller screens */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid #e5e5e5; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>

    <nav class="sidebar">
        <h2><a href="{{ '/' | relative_url }}" style="color: inherit;">Math Notes</a></h2>
        <ul>
            {% comment %} Loops through all markdown files in your repository {% endcomment %}
            {% assign sorted_pages = site.pages | sort: "title" %}
            {% for p in sorted_pages %}
                {% if p.title and p.url != "/404.html" %}
                    <li>
                        <a href="{{ p.url | relative_url }}" class="{% if page.url == p.url %}active{% endif %}">
                            {{ p.title }}
                        </a>
                    </li>
                {% endif %}
            {% endfor %}
        </ul>
    </nav>

    <main class="main-content">
        {{ content }}
    </main>

</body>
</html>
